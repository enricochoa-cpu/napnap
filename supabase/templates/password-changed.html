<!--
  NapNap – Password changed confirmation email template
  Copy the inner HTML into:
  Supabase Dashboard → Authentication → Email Templates → Change Email Address
  Subject line: "Your NapNap password was changed"
-->
<div style="margin:0;padding:0;background-color:#F5F0E8;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#F5F0E8;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <img src="https://napnap.vercel.app/logo-email.png" width="200" height="80" alt="NapNap" style="display:block;margin:0 auto;" />
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#1E2230;border-radius:24px;padding:40px 32px;border:1px solid rgba(255,255,255,0.08);">

              <!-- Heading -->
              <p style="margin:0 0 8px;font-size:22px;font-weight:700;color:#F0F0F5;">
                Password changed
              </p>
              <p style="margin:0 0 24px;font-size:15px;color:#D1D5DB;line-height:1.6;">
                Your NapNap password was successfully updated. You can continue using the app as normal.
              </p>

              <!-- Safety note -->
              <p style="margin:0;font-size:13px;color:#9CA3AF;text-align:center;line-height:1.5;">
                If you didn't make this change, please <a href="mailto:getnapnap@gmail.com" style="color:#9DBAB7;text-decoration:underline;">contact us</a> immediately.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:32px;">
              <p style="margin:0;font-size:12px;color:#6B7280;line-height:1.5;">
                This is a security notification. No action is needed if this was you.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</div>
