<!--
  NapNap – Confirm signup email template
  Copy the inner HTML into:
  Supabase Dashboard → Authentication → Email Templates → Confirm signup
  Subject line: "Confirm your NapNap account"
-->
<div style="margin:0;padding:0;background-color:#F5F0E8;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#F5F0E8;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <img src="https://napnap.vercel.app/logo-email.png" width="200" height="80" alt="NapNap" style="display:block;margin:0 auto;" />
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#1E2230;border-radius:24px;padding:40px 32px;border:1px solid rgba(255,255,255,0.08);">

              <!-- Heading -->
              <p style="margin:0 0 8px;font-size:22px;font-weight:700;color:#F0F0F5;">
                Confirm your account
              </p>
              <p style="margin:0 0 24px;font-size:15px;color:#D1D5DB;line-height:1.6;">
                Tap below to confirm your email and start tracking your baby's sleep.
              </p>

              <!-- CTA Button -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" target="_blank" rel="noopener"
                       style="display:inline-block;background-color:#9DBAB7;color:#1E2230;font-size:16px;font-weight:700;padding:14px 40px;border-radius:16px;text-decoration:none;">
                      Confirm my email
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Fallback link -->
              <p style="margin:24px 0 8px;font-size:13px;color:#9CA3AF;text-align:center;line-height:1.5;">
                If the button doesn't work, copy and paste this link:
              </p>
              <p style="margin:0;font-size:12px;text-align:center;word-break:break-all;line-height:1.5;">
                <a href="{{ .ConfirmationURL }}" style="color:#9DBAB7;text-decoration:underline;">{{ .ConfirmationURL }}</a>
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:32px;">
              <p style="margin:0;font-size:12px;color:#6B7280;line-height:1.5;">
                If you didn't create an account, you can safely ignore this email.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</div>
